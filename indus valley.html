<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Indus Valley Civilization MCQ Test</title>
  <body>

<div class="site-header">
  <a href="index.html">📚Assam MCQ</a>
</div>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
padding:20px;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
text-align:center;
}

#timer{
text-align:right;
font-size:20px;
color:red;
font-weight:bold;
}

.question{
margin-top:15px;
padding:12px;
background:#f1f4ff;
border-left:5px solid #ff6a00;
border-radius:8px;
}

button{
margin-top:20px;
padding:12px 25px;
background:#ff5722;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

#result{
text-align:center;
margin-top:20px;
font-size:22px;
color:green;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>Indus Valley Civilization MCQ Test</h1>

<div id="timer">Time Left: 10:00</div>

<form id="quiz"></form>

<button onclick="submitQuiz()">Submit Test</button>

<h2 id="result"></h2>

</div>

<script>

const questions=[

{q:"Indus Valley Civilization ka dusra naam kya hai?",o:["Harappan Civilization","Vedic Civilization","Gupta Civilization","Maurya Civilization"],a:"Harappan Civilization"},

{q:"Harappa city kis river ke paas tha?",o:["Ravi","Ganga","Yamuna","Godavari"],a:"Ravi"},

{q:"Mohenjo-daro ka matlab kya hai?",o:["City of Gold","Mound of the Dead","City of Kings","Old City"],a:"Mound of the Dead"},

{q:"Indus Valley Civilization kab start hua?",o:["2500 BCE","1500 BCE","500 BCE","100 BCE"],a:"2500 BCE"},

{q:"Harappa kis country me hai?",o:["India","Pakistan","Nepal","Bangladesh"],a:"Pakistan"},

{q:"Indus Valley Civilization me sabse famous building kya thi?",o:["Drainage System","Temple","Palace","Fort"],a:"Drainage System"},

{q:"Mohenjo-daro kaha hai?",o:["India","Pakistan","Nepal","Afghanistan"],a:"Pakistan"},

{q:"Indus Valley log kis metal ka use karte the?",o:["Iron","Copper","Bronze","Gold"],a:"Bronze"},

{q:"Indus Valley Civilization ka script kaisa hai?",o:["Fully readable","Partially readable","Not yet decoded","Latin"],a:"Not yet decoded"},

{q:"Great Bath kaha mila?",o:["Harappa","Mohenjo-daro","Lothal","Dholavira"],a:"Mohenjo-daro"},

{q:"Lothal kis cheez ke liye famous hai?",o:["Dockyard","Temple","Fort","Market"],a:"Dockyard"},

{q:"Indus Valley ke log kya karte the?",o:["Agriculture","Trade","Craft","All of these"],a:"All of these"},

{q:"Indus Valley Civilization ka decline kab hua?",o:["1900 BCE","1500 BCE","1000 BCE","500 BCE"],a:"1900 BCE"},

{q:"Indus Valley ke ghar kis se bane hote the?",o:["Stone","Wood","Baked bricks","Mud only"],a:"Baked bricks"},

{q:"Dholavira kaha hai?",o:["Gujarat","Punjab","Rajasthan","Haryana"],a:"Gujarat"},

{q:"Harappa ko kisne discover kiya?",o:["Dayaram Sahni","John Marshall","Alexander","Ashoka"],a:"Dayaram Sahni"},

{q:"Indus Valley Civilization kis river system me tha?",o:["Indus River","Ganga River","Yamuna River","Godavari River"],a:"Indus River"},

{q:"Indus Valley log kis animal ko sacred mante the?",o:["Horse","Bull","Tiger","Elephant"],a:"Bull"},

{q:"Indus Valley ka famous statue kaun sa hai?",o:["Dancing Girl","Buddha Statue","Ashoka Lion","Iron Pillar"],a:"Dancing Girl"},

{q:"Indus Valley Civilization kis period ka part hai?",o:["Ancient India","Medieval India","Modern India","British India"],a:"Ancient India"}

]

const quiz=document.getElementById("quiz")

questions.forEach((q,i)=>{

let html=`<div class="question"><b>${i+1}. ${q.q}</b><br>`

q.o.forEach(opt=>{
html+=`<label><input type="radio" name="q${i}" value="${opt}"> ${opt}</label><br>`
})

html+="</div>"

quiz.innerHTML+=html

})

function submitQuiz(){

let score=0

questions.forEach((q,i)=>{

let ans=document.querySelector(`input[name="q${i}"]:checked`)

if(ans && ans.value===q.a){
score++
}

})

document.getElementById("result").innerText="Your Score: "+score+" / "+questions.length

}

let time=600

const timer=setInterval(()=>{

let m=Math.floor(time/60)
let s=time%60

document.getElementById("timer").innerText="Time Left: "+m+":"+(s<10?"0":"")+s

time--

if(time<0){
clearInterval(timer)
submitQuiz()
}

},1000)

</script>
