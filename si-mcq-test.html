{q:"পূবৰ স্কটলেণ্ড বুলি কোৱা হয়?",o:["গুৱাহাটী","শিলং","দিফু","যোৰহাট"],a:1},
{q:"সত্যমেৱ জয়তে কৰ পৰা লোৱা হৈছে?",o:["গীতা","ৰামায়ণ","মুণ্ডক উপনিষদ","বেদ"],a:2},
{q:"মানৰ দ্বিতীয় আক্ৰমণত সেনাপতি কোন আছিল?",o:["সুকাফা","মিংগি মহা তিলোৱা","ৰুদ্ৰ সিংহ","শিৱ সিংহ"],a:1},
{q:"কোচ ৰাজ্যৰ প্ৰতিষ্ঠাপক কোন?",o:["নৰনাৰায়ণ","বিশ্ব সিংহ","চিলাৰায়","নীলাম্বৰ"],a:1},
{q:"RBI ৰ প্ৰতীকত থকা জন্তুটো কি?",o:["সিংহ","বাঘ","ঘোঁৰা","হাতী"],a:1},
{q:"ভাৰতৰ লৌহ মানৱ কোন?",o:["গান্ধী","নেহৰু","সৰ্দাৰ পেটেল","ৰাজেন্দ্ৰ প্ৰসাদ"],a:2},

{q:"ৰেড ক্ৰছ দিৱস কেতিয়া?",o:["5 মে","8 মে","10 মে","15 মে"],a:1},

{q:"Assamese its formation and development কোনে লিখিছিল?",o:["হেমচন্দ্ৰ","বনকান্ত কাকতি","শংকৰদেৱ","বেজবৰুৱা"],a:1},
{q:"হত্যাৰ ধাৰা কিমান?",o:["300","302","307","420"],a:1},

{q:"বাক স্বাধীনতা কোন অনুচ্ছেদ?",o:["14","19","21","32"],a:1},

{q:"অসম মহিলা সমিতি কেতিয়া?",o:["1920","1926","1930","1947"],a:1},
{q:"কামৰূপৰ শেষ বংশ?",o:["আহোম","পাল বংশ","কচাৰী","কোচ"],a:1},
{q:"নামঘোষাত কেইটা ঘোষা?",o:["900","1000","1100","1200"],a:1},
{q:"তলৰ কোনটো মেৰুদণ্ডী নহয়?",o:["মাছ","কাছ","চৰাই","সাপ"],a:1},
{q:"প্ৰহ্লাদ চৰিত কাৰ ৰচনা?",o:["শংকৰদেৱ","মাধৱদেৱ","বেজবৰুৱা","কাকতি"],a:0},
{q:"মৌৰ্য সাম্ৰাজ্যৰ প্ৰতিষ্ঠাপক কোন?",o:["অশোক","চন্দ্ৰগুপ্ত মৌৰ্য","বিন্দুসাৰ","কৌটিল্য"],a:1}
];

const form = document.getElementById("quizForm");

quizData.forEach((item,index)=>{
let html = `<div class="question"><p>${index+1}. ${item.q}</p>`;
item.o.forEach((opt,i)=>{
html += `<label class="option"><input type="radio" name="q${index}" value="${i}"> ${opt}</label>`;
});
html += `</div>`;
form.innerHTML += html;
});

function checkAnswers(){
let score=0;

quizData.forEach((item,index)=>{
let options = document.getElementsByName("q"+index);
let selected = document.querySelector(`input[name="q${index}"]:checked`);

options.forEach((opt,i)=>{
let label = opt.parentElement;

if(i === item.a){
label.classList.add("correct"); // correct always green
}

if(selected && parseInt(selected.value) === i && i !== item.a){
label.classList.add("wrong"); // wrong selected red
}
});

if(selected && parseInt(selected.value) === item.a){
score++;
}
});

document.getElementById("result").innerHTML =
"Your Score: "+score+" / "+quizData.length;
}

</script>
